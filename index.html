<!DOCTYPE html>
<html lang="ku" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>University Portal | Semester Exam</title>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --photo-blue-grad: linear-gradient(90deg, #0061ff 0%, #60efff 100%);
            --correct: #10b981;
            --wrong: #ef4444;
            --bg-mesh: #f8fbff;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'IBM Plex Sans Arabic', sans-serif; }

        body { background: #ffffff; direction: rtl; overflow-x: hidden; }

        /* --- HERO SECTION --- */
        #hero-page {
            height: 100vh; width: 100%; display: flex; flex-direction: column;
            justify-content: center; align-items: center; text-align: center;
            position: fixed; top: 0; left: 0; z-index: 1000;
            background: radial-gradient(at 0% 0%, #f0f9ff 0%, transparent 40%), #ffffff;
            transition: transform 0.8s cubic-bezier(0.8, 0, 0.2, 1);
        }

        /* --- SUBJECT SELECTION --- */
        #subject-page {
            display: none; min-height: 100vh; padding: 100px 20px;
            background: var(--bg-mesh); text-align: center;
        }

        .subject-grid {
            display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px; max-width: 1000px; margin: 40px auto;
        }

        .subject-card {
            background: white; padding: 40px; border-radius: 25px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05); cursor: pointer;
            transition: 0.3s; border: 2px solid transparent;
        }

        .subject-card:hover { border-color: #0061ff; transform: translateY(-10px); }
        .subject-card h3 { font-size: 1.5rem; color: #0f172a; margin-top: 15px; }

        /* --- QUIZ AREA --- */
        #main-quiz { display: none; background: var(--bg-mesh); min-height: 100vh; }

        .top-nav {
            position: sticky; top: 0; z-index: 100;
            background: rgba(255, 255, 255, 0.85); backdrop-filter: blur(12px);
            padding: 20px; border-bottom: 1px solid #e2e8f0;
        }

        .nav-info { max-width: 800px; margin: 0 auto; display: flex; justify-content: space-between; align-items: center; }

        .hero-title { font-size: clamp(3rem, 10vw, 6rem); font-weight: 800; background: var(--photo-blue-grad); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 20px; }
        .start-btn { background: var(--photo-blue-grad); color: white; padding: 18px 65px; border-radius: 16px; font-size: 1.5rem; font-weight: 700; border: none; cursor: pointer; transition: 0.4s; }
        
        .progress-rail { width: 100%; max-width: 800px; height: 6px; background: #e2e8f0; border-radius: 10px; margin: 10px auto 0; overflow: hidden; }
        #progress-fill { height: 100%; width: 0%; background: var(--photo-blue-grad); transition: 0.5s; float: right; }

        .quiz-container { max-width: 750px; margin: 40px auto; padding: 0 20px; padding-bottom: 100px; }
        .card { background: white; border-radius: 35px; padding: 45px; margin-bottom: 40px; box-shadow: 0 15px 40px rgba(0, 97, 255, 0.04); }
        .q-label { display: inline-flex; padding: 8px 25px; background: var(--photo-blue-grad); color: white; border-radius: 100px; font-weight: 800; margin-bottom: 20px; }
        .q-text { font-size: 1.4rem; font-weight: 700; margin-bottom: 30px; color: #0f172a; }

        .opt {
            background: #ffffff; border: 2px solid #f1f5f9; padding: 18px; border-radius: 15px;
            cursor: pointer; font-size: 1.1rem; font-weight: 600; margin-bottom: 12px;
            display: flex; justify-content: space-between; transition: 0.3s;
        }

        .opt.correct { background: #ecfdf5; border-color: var(--correct); }
        .opt.wrong { background: #fef2f2; border-color: var(--wrong); }
        .disabled { pointer-events: none; }
        
        .back-btn { background: #64748b; color: white; padding: 10px 20px; border-radius: 10px; border: none; cursor: pointer; margin-bottom: 20px; }
    </style>
</head>
<body>

<section id="hero-page">
    <h1 class="hero-title">Block 2<br>University Portal</h1>
    <p style="color: #8fa0b3; margin-bottom: 40px;">Select your subject to begin practicing</p>
    <button class="start-btn" onclick="showSubjects()">Enter Semester</button>
</section>

<section id="subject-page">
    <h2 style="font-size: 2.5rem; margin-bottom: 10px;">Subjects</h2>
    <p style="color: #64748b;">Choose a file to see MCQs</p>
    
    <div class="subject-grid">
        <div class="subject-card" onclick="loadQuiz('biophysics')">
            <div style="font-size: 3rem;">🧬</div>
            <h3>File 1: Biophysics</h3>
        </div>
        <div class="subject-card" onclick="loadQuiz('biochemistry')">
            <div style="font-size: 3rem;">🧪</div>
            <h3>File 2: Biochemistry</h3>
        </div>
        <div class="subject-card" onclick="loadQuiz('bec')">
            <div style="font-size: 3rem;">📊</div>
            <h3>File 3: BEC</h3>
        </div>
        <div class="subject-card" onclick="loadQuiz('practical')">
            <div style="font-size: 3rem;">🔬</div>
            <h3>File 4: Practical</h3>
        </div>
    </div>
</section>

<div id="main-quiz">
    <div class="top-nav">
        <div class="nav-info">
            <button class="back-btn" onclick="location.reload()">Back</button>
            <span id="subject-title" style="font-weight: 800; color: #0061ff;">Subject</span>
            <span id="counter" style="font-weight: 700; color: #64748b;">0 / 0</span>
        </div>
        <div class="progress-rail"><div id="progress-fill"></div></div>
    </div>
    
    <div class="quiz-container" id="quiz-mount"></div>

    <div class="quiz-container">
        <div id="finish-screen" class="card" style="display:none; text-align: center;">
            <h2 style="font-size: 2.5rem; color: #0061ff;">Well Done!</h2>
            <button class="start-btn" style="margin-top: 30px;" onclick="location.reload()">Choose Another Subject</button>
        </div>
    </div>
</div>

<script>
    // --- DATABASE FOR ALL SUBJECTS ---
    const allData = {
        biophysics: [
            { q: "What is Biophysics?", options: ["Option A", "Option B", "Option C"], correct: 0 },
            { q: "Second question for Biophysics?", options: ["A", "B"], correct: 1 }
        ],
        biochemistry: [
            { q: "What is a protein?", options: ["Ans 1", "Ans 2"], correct: 0 }
        ],
        bec: [
            { q: "BEC Exam Question 1?", options: ["True", "False"], correct: 0 }
        ],
        practical: [
            { q: "Laboratory Safety Question?", options: ["Yes", "No"], correct: 0 }
        ]
    };

    let currentSubjectQuestions = [];
    let completedCount = 0;

    function showSubjects() {
        document.getElementById('hero-page').style.transform = "translateY(-100%)";
        setTimeout(() => {
            document.getElementById('subject-page').style.display = 'block';
        }, 600);
    }

    function loadQuiz(subjectKey) {
        currentSubjectQuestions = allData[subjectKey];
        completedCount = 0;
        
        document.getElementById('subject-page').style.display = 'none';
        document.getElementById('main-quiz').style.display = 'block';
        document.getElementById('subject-title').innerText = subjectKey.toUpperCase();
        
        initQuiz();
    }

    function initQuiz() {
        const mount = document.getElementById('quiz-mount');
        mount.innerHTML = ''; // Clear previous
        document.getElementById('progress-fill').style.width = '0%';
        document.getElementById('counter').innerText = `0 / ${currentSubjectQuestions.length}`;
        
        currentSubjectQuestions.forEach((q, idx) => {
            const card = document.createElement('div');
            card.className = 'card';
            card.id = `card-${idx}`;
            card.innerHTML = `
                <div class="q-label">Question ${idx + 1}</div>
                <div class="q-text">${q.q}</div>
                <div class="options-list">
                    ${q.options.map((opt, oIdx) => `
                        <div class="opt" onclick="check(this, ${idx}, ${oIdx}, ${q.correct})">
                            <span>${opt}</span>
                        </div>
                    `).join('')}
                </div>
            `;
            mount.appendChild(card);
        });
    }

    function check(el, qIdx, selected, correct) {
        const parent = el.parentElement;
        const opts = parent.querySelectorAll('.opt');
        opts.forEach(o => o.classList.add('disabled'));

        if(selected === correct) el.classList.add('correct');
        else { el.classList.add('wrong'); opts[correct].classList.add('correct'); }
        
        completedCount++;
        document.getElementById('progress-fill').style.width = `${(completedCount / currentSubjectQuestions.length) * 100}%`;
        document.getElementById('counter').innerText = `${completedCount} / ${currentSubjectQuestions.length}`;

        if (completedCount === currentSubjectQuestions.length) {
            document.getElementById('finish-screen').style.display = 'block';
            document.getElementById('finish-screen').scrollIntoView({ behavior: 'smooth' });
        }
    }
</script>

</body>
</html>
